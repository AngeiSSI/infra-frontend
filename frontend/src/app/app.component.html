<div style="display: flex; min-height: 100vh; width: 100%;">
  <!-- Sidebar solo si está autenticado -->
  <app-sidebar *ngIf="isAuthenticated && !isLoginPage"></app-sidebar>
  
  <!-- Contenido principal con margen izquierdo -->
  <div style="flex: 1; overflow-y: auto; display: flex; flex-direction: column; margin-left: 250px;" [style.margin-left]="(isAuthenticated && !isLoginPage) ? '250px' : '0'">
    <router-outlet></router-outlet>
  </div>
</div>
