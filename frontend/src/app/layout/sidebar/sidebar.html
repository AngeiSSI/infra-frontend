<div class="main-sidebar">
  <!-- Header con Logo -->
  <div class="sidebar-header">
    <div class="sidebar-logo-container">
      <img src="/claro-logo.png" alt="Claro Logo" class="sidebar-logo">
    </div>
    <h2>Infraestructura</h2>
  </div>

  <!-- Main Menu -->
  <div class="sidebar-section">
    <div class="sidebar-main-item" 
         [class.active]="activeMenuItem.includes('actividades')"
         [class.expanded]="submenuOpen"
         (click)="toggleSubmenu()">
      <span class="icon">📋</span>
      <span>Actividades</span>
      <span class="chevron">›</span>
    </div>

    <!-- Submenu -->
    <div class="sidebar-submenu" [class.open]="submenuOpen">
      <div class="sidebar-subitem" 
           [class.active]="activeMenuItem === 'mis-actividades'"
           (click)="setActiveMenu('mis-actividades')">
        ✏️ Mis Actividades
      </div>
      <div class="sidebar-subitem" 
           [class.active]="activeMenuItem === 'grupo'"
           (click)="setActiveMenu('grupo')">
        👥 Mi Grupo
      </div>
      <div class="sidebar-subitem" 
           [class.active]="activeMenuItem === 'total'"
           *ngIf="puedeVerTotal()"
           (click)="setActiveMenu('total')">
        🌍 Total
      </div>
      <div class="sidebar-subitem" 
           [class.active]="activeMenuItem === 'seguimiento'"
           *ngIf="puedeVerSeguimiento()"
           (click)="setActiveMenu('seguimiento')">
        📊 Seguimiento
      </div>
    </div>
  </div>

  <!-- Catálogo -->
  <div class="sidebar-section">
    <div class="sidebar-main-item"
         [class.active]="activeMenuItem === 'catalogo'"
         (click)="navigateTo('catalogo')">
      <span class="icon">📚</span>
      <span>Catálogo</span>
    </div>
  </div>

  <!-- Gestión Usuarios -->
  <div class="sidebar-section" *ngIf="puedeVerGestionUsuarios()">
    <div class="sidebar-main-item"
         [class.active]="activeMenuItem === 'gestion-usuarios'"
         (click)="navigateTo('gestion-usuarios')">
      <span class="icon">👥</span>
      <span>Usuarios</span>
    </div>
  </div>

  <!-- Footer -->
  <div class="sidebar-footer">
    <div class="sidebar-footer-item">
      👤 <strong>{{ usuario?.nombre }}</strong>
    </div>
    <div class="sidebar-footer-item">
      🔑 {{ usuario?.rol | titlecase }}
    </div>
    <button class="logout-btn" (click)="logout()">
      Cerrar Sesi��n
    </button>
  </div>
</div>
