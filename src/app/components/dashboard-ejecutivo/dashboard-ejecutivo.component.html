<div class="dashboard-ejecutivo">
  <h1>📊 Dashboard Ejecutivo</h1>

  <div *ngIf="cargando" class="spinner">Cargando...</div>

  <div *ngIf="!cargando" class="kpis-grid">
    <div class="kpi-card">
      <h3>Actividades Abiertas</h3>
      <p class="valor">{{ dashboard.actividadesAbiertas || 0 }}</p>
    </div>

    <div class="kpi-card">
      <h3>Actividades Vencidas</h3>
      <p class="valor error">{{ dashboard.actividadesVencidas || 0 }}</p>
    </div>

    <div class="kpi-card">
      <h3>Cumplimiento Promedio</h3>
      <p class="valor exito">{{ (dashboard.cumplimientoPorLider | json | slice:0:5)}}%</p>
    </div>
  </div>

  <div class="graficos">
    <div class="grafico-card">
      <h3>Productividad Mensual</h3>
      <div id="chart-productividad"></div>
    </div>

    <div class="grafico-card">
      <h3>Tendencia Trimestral</h3>
      <div id="chart-tendencia"></div>
    </div>
  </div>
</div>
