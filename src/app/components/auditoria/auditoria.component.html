<div class="auditoria-container">
  <h1>📝 Auditoría</h1>

  <div class="auditoria-controls">
    <button (click)="exportar()" class="btn-exportar">📥 Exportar a Excel</button>
  </div>

  <div *ngIf="cargando" class="spinner">Cargando auditoría...</div>

  <div *ngIf="error" class="alert alert-error">{{ error }}</div>

  <div *ngIf="!cargando && registros.length > 0" class="tabla-auditoria">
    <table>
      <thead>
        <tr>
          <th>Usuario</th>
          <th>Fecha</th>
          <th>Módulo</th>
          <th>Acción</th>
          <th>ID Registro</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let registro of registros">
          <td>{{ registro.usuario }}</td>
          <td>{{ registro.fecha | date:'short' }}</td>
          <td>{{ registro.modulo }}</td>
          <td><span class="accion-badge" [ngClass]="'accion-' + registro.accion">{{ registro.accion }}</span></td>
          <td>{{ registro.registroId }}</td>
        </tr>
      </tbody>
    </table>
  </div>

  <div *ngIf="!cargando && registros.length === 0" class="sin-datos">
    <p>📭 Sin registros de auditoría</p>
  </div>
</div>
